<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno de Ruta · Zona Sur</title>
<style>
  :root{
    --paper:#ece9e0;
    --paper-line:#d9d5c8;
    --ink:#201f1c;
    --ink-soft:#5c584f;
    --card:#fbfaf6;
    --amber:#c8791f;
    --amber-dark:#9c5c14;
    --red:#a8402a;
    --line:#c7c2b3;

    --c-per:#3f6e4c; --c-per-bg:#e8f0e6;
    --c-ali:#8a7f2e; --c-ali-bg:#f2efdc;
    --c-noa:#4c6470; --c-noa-bg:#e6edef;
    --c-caj:#33547d; --c-caj-bg:#e4eaf1;
    --c-alm:#79532f; --c-alm-bg:#f0e8da;
    --c-man:#a8402a; --c-man-bg:#f5e2dc;
    --c-ges:#5f4f6b; --c-ges-bg:#ece5ef;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:640px; margin:0 auto; min-height:100vh; background:var(--paper); position:relative;}

  header{
    padding:18px 18px 14px; border-bottom:2px solid var(--ink);
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  header .title{
    font-family:'Arial Narrow',Arial,sans-serif; font-weight:800;
    letter-spacing:0.5px; font-size:22px; text-transform:uppercase;
  }
  header .sub{font-size:11px; color:var(--ink-soft); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px;}
  header .code{font-family:'SF Mono',Consolas,Menlo,monospace; font-size:12px; color:var(--ink-soft); text-align:right;}

  .setup{padding:14px 18px; display:flex; gap:10px; border-bottom:1px dashed var(--line);}
  .setup select, .setup input{
    flex:1; padding:10px 8px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-size:14px; border-radius:2px; font-family:inherit;
  }
  .setup select{flex:1.4;}

  .rec-zone{padding:22px 18px 10px; text-align:center;}
  .mic-btn{
    width:84px; height:84px; border-radius:50%; border:3px solid var(--ink);
    background:var(--card); display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .15s ease; position:relative;
  }
  .mic-btn svg{width:32px; height:32px; fill:var(--ink);}
  .mic-btn.on{background:var(--red); border-color:var(--red); animation:pulse 1.4s infinite;}
  .mic-btn.on svg{fill:#fff;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(168,64,42,0.45);}
    70%{box-shadow:0 0 0 16px rgba(168,64,42,0);}
    100%{box-shadow:0 0 0 0 rgba(168,64,42,0);}
  }
  .rec-label{margin-top:8px; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft);}
  .rec-label.on{color:var(--red); font-weight:700;}

  .transcript-box{padding:10px 18px 4px;}
  textarea{
    width:100%; min-height:70px; resize:vertical; border:1px solid var(--line);
    background:var(--card); padding:10px; font-size:14px; font-family:inherit; color:var(--ink);
    border-radius:2px;
  }
  .actions-row{display:flex; gap:8px; padding:8px 18px 18px;}
  button{
    font-family:inherit; cursor:pointer; border-radius:2px; border:1px solid var(--ink);
    background:var(--ink); color:#fff; padding:10px 14px; font-size:13px; font-weight:600;
    letter-spacing:0.3px;
  }
  button.secondary{background:var(--card); color:var(--ink);}
  button:disabled{opacity:0.45; cursor:not-allowed;}
  button.wide{flex:1;}

  .status-line{padding:0 18px 10px; font-size:12px; color:var(--ink-soft); min-height:16px;}
  .status-line.err{color:var(--red);}

  .list-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 18px 6px; border-top:2px solid var(--ink);
  }
  .list-head h2{font-size:13px; text-transform:uppercase; letter-spacing:1.5px; margin:0;}
  .list-head .count{font-family:'SF Mono',Consolas,monospace; font-size:12px; color:var(--ink-soft);}

  .tickets{padding:6px 18px 100px;}
  .ticket{
    background:var(--card); border:1px solid var(--line); border-top:3px dashed var(--line);
    margin-bottom:10px; padding:12px 14px; position:relative;
  }
  .ticket .row1{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .tag{
    font-family:'SF Mono',Consolas,monospace; font-size:11px; font-weight:700;
    padding:2px 7px; border-radius:2px; white-space:nowrap;
  }
  .crit{color:var(--red); font-size:11px; font-weight:800; letter-spacing:0.5px; margin-left:6px;}
  .ticket p.txt{margin:8px 0 6px; font-size:14.5px; line-height:1.4;}
  .ticket .row2{display:flex; justify-content:space-between; align-items:center;}
  .ticket .subcat{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.5px;}
  .ticket .del{background:none; border:none; color:var(--ink-soft); font-size:12px; padding:2px 6px; text-decoration:underline;}

  .empty{padding:30px 18px; text-align:center; color:var(--ink-soft); font-size:13px;}

  footer{
    position:sticky; bottom:0; background:var(--paper); border-top:2px solid var(--ink);
    padding:12px 18px; display:flex; gap:10px;
  }
  footer button{flex:1; padding:13px;}
  .btn-export{background:var(--amber-dark); border-color:var(--amber-dark);}

  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:9px 16px; border-radius:3px; font-size:12.5px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:50; max-width:80%; text-align:center;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="title">Cuaderno de Ruta</div>
      <div class="sub">Family Cash · Zona Sur</div>
    </div>
    <div class="code" id="dateCode">--/--/----</div>
  </header>

  <div class="setup">
    <select id="storeSelect">
      <option value="">Selecciona tienda…</option>
      <option value="T010 · Montilla">T010 · Montilla</option>
      <option value="T012 · Morón de la Frontera">T012 · Morón de la Frontera</option>
      <option value="T013 · Osuna">T013 · Osuna</option>
      <option value="T019 · Alcalá de Guadaíra">T019 · Alcalá de Guadaíra</option>
      <option value="T022 · Utrera">T022 · Utrera</option>
      <option value="T024 · Almendralejo">T024 · Almendralejo</option>
      <option value="T027 · Lebrija">T027 · Lebrija</option>
      <option value="T028 · Melilla">T028 · Melilla</option>
      <option value="T032 · Chiclana">T032 · Chiclana</option>
      <option value="T038 · Sevilla Cavaleri">T038 · Sevilla Cavaleri</option>
      <option value="T041 · Jerez">T041 · Jerez</option>
    </select>
  </div>

  <div class="rec-zone">
    <button class="mic-btn" id="micBtn" aria-label="Grabar">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11h-2z"/></svg>
    </button>
    <div class="rec-label" id="recLabel">Toca para dictar</div>
  </div>

  <div class="transcript-box">
    <textarea id="transcript" placeholder="El texto dictado aparece aquí. También puedes escribir o corregir a mano…"></textarea>
  </div>

  <div class="actions-row">
    <button class="wide" id="processBtn">Procesar y añadir a la lista</button>
    <button class="secondary" id="clearBtn" title="Vaciar texto">Vaciar</button>
  </div>
  <div class="status-line" id="statusLine"></div>

  <div class="list-head">
    <h2>Incidencias detectadas</h2>
    <span class="count" id="countLabel">0</span>
  </div>

  <div class="tickets" id="ticketList">
    <div class="empty" id="emptyMsg">Aún no hay incidencias. Dicta la primera observación de la visita.</div>
  </div>

  <footer>
    <button class="secondary" id="newVisitBtn">Nueva visita</button>
    <button class="btn-export" id="exportBtn">Descargar Word</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  PER: {label:"Perecederos", color:"var(--c-per)", bg:"var(--c-per-bg)"},
  ALI: {label:"Alimentación", color:"var(--c-ali)", bg:"var(--c-ali-bg)"},
  NOA: {label:"No Alimentación", color:"var(--c-noa)", bg:"var(--c-noa-bg)"},
  CAJ: {label:"Cajas", color:"var(--c-caj)", bg:"var(--c-caj-bg)"},
  ALM: {label:"Almacenes y Muelles", color:"var(--c-alm)", bg:"var(--c-alm-bg)"},
  MAN: {label:"Mantenimiento", color:"var(--c-man)", bg:"var(--c-man-bg)"},
  GES: {label:"Gestión y Otros", color:"var(--c-ges)", bg:"var(--c-ges-bg)"}
};

let incidents = []; // {code, cat, subcat, text, critico}
let seq = {PER:0,ALI:0,NOA:0,CAJ:0,ALM:0,MAN:0,GES:0};
let currentStore = "";
let draftKey = null;

const dateCode = document.getElementById('dateCode');
const storeSelect = document.getElementById('storeSelect');
const micBtn = document.getElementById('micBtn');
const recLabel = document.getElementById('recLabel');
const transcript = document.getElementById('transcript');
const processBtn = document.getElementById('processBtn');
const clearBtn = document.getElementById('clearBtn');
const statusLine = document.getElementById('statusLine');
const ticketList = document.getElementById('ticketList');
const emptyMsg = document.getElementById('emptyMsg');
const countLabel = document.getElementById('countLabel');
const toast = document.getElementById('toast');
const exportBtn = document.getElementById('exportBtn');
const newVisitBtn = document.getElementById('newVisitBtn');

function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
}
dateCode.textContent = todayStr();

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2200);
}

// ---------- Reconocimiento de voz ----------
let recognizing = false;
let recognition = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR){
  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = true;
  recognition.interimResults = true;
  let baseText = "";

  recognition.onstart = ()=>{
    recognizing = true;
    baseText = transcript.value ? transcript.value + " " : "";
    micBtn.classList.add('on');
    recLabel.textContent = "Escuchando… toca para parar";
    recLabel.classList.add('on');
  };
  recognition.onerror = (e)=>{
    setStatus("Error de micrófono: " + e.error, true);
  };
  recognition.onend = ()=>{
    recognizing = false;
    micBtn.classList.remove('on');
    recLabel.textContent = "Toca para dictar";
    recLabel.classList.remove('on');
  };
  let lastFinal = "";
  recognition.onresult = (event)=>{
    let finalChunk = "";
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++){
      const r = event.results[i];
      if (r.isFinal) finalChunk += r[0].transcript;
      else interim += r[0].transcript;
    }
    // Android repite a veces el mismo bloque final tras un reinicio interno del motor de voz.
    const finalTrim = finalChunk.trim();
    if (finalTrim && finalTrim !== lastFinal){
      baseText += finalTrim + " ";
      lastFinal = finalTrim;
    }
    transcript.value = dedupeConsecutive((baseText + interim).trim());
  };
} else {
  recLabel.textContent = "Dictado por voz no disponible en este navegador";
  micBtn.disabled = true;
}

micBtn.addEventListener('click', ()=>{
  if (!recognition) return;
  if (recognizing) recognition.stop();
  else {
    try{ recognition.start(); } catch(e){ /* ya iniciado */ }
  }
});

function setStatus(msg, isErr){
  statusLine.textContent = msg;
  statusLine.classList.toggle('err', !!isErr);
}

// Quita palabras o grupos de 2-4 palabras que se repiten justo seguidas
// (típico fallo del reconocimiento de voz de Android en grabaciones largas).
function dedupeConsecutive(text){
  let words = text.split(/\s+/);
  for (let size = 4; size >= 1; size--){
    const out = [];
    let i = 0;
    while (i < words.length){
      if (i + size*2 <= words.length){
        const a = words.slice(i, i+size).join(' ').toLowerCase();
        const b = words.slice(i+size, i+size*2).join(' ').toLowerCase();
        if (a === b && a.length){
          out.push(...words.slice(i, i+size));
          i += size*2;
          continue;
        }
      }
      out.push(words[i]);
      i += 1;
    }
    words = out;
  }
  return words.join(' ');
}

// ---------- Procesar dictado (limpieza y clasificación 100% local, sin internet) ----------
const MULETILLAS = ["eh","ehh","ehhh","este","esto es","o sea","bueno","pues","vale",
  "tipo","digamos","mmm","mm","ah","aha","aa","aaa","venga","nada","en fin","¿no?","no?"];

const CONECTORES_CORTE = ["también","además","por otro lado","otra cosa","y luego","y también",
  "otra incidencia","aparte","otra cosa es que","cambiando de tema"];

const CATEGORIA_PALABRAS = {
  PER: ["fruta","verdura","fruteria","frutería","carniceria","carnicería","pescaderia","pescadería",
        "panaderia","panadería","pasteleria","caducado","caducidad","charcuteria","charcutería","genero","género","merma"],
  MAN: ["averia","avería","roto","rota","gotera","luz","luces","fundida","frigorifico","frigorífico",
        "camara","cámara","aire acondicionado","climatizacion","climatización","persiana","puerta","suelo","fuga"],
  CAJ: ["caja","cajas","cola","tpv","cobro","cliente esperando","balanza","ticket"],
  ALM: ["muelle","palet","recepcion","recepción","almacen","almacén","proveedor","descarga","pedido"],
  NOA: ["bazar","textil","menaje","droguería","drogueria","perfumeria","perfumería"],
  ALI: ["alimentacion","alimentación","lineal","gondola","góndola","seco","envasado","estanteria","estantería"],
  GES: ["personal","plantilla","formacion","formación","horario","absentismo","empleado","director","reunion","reunión"]
};

const CRITICO_PALABRAS = ["urgente","peligro","riesgo","grave","fuga","incendio","seguridad",
  "caducado grave","accidente","emergencia","inmediato"];

function limpiarMuletillas(text){
  let t = " " + text.toLowerCase() + " ";
  MULETILLAS.forEach(m=>{
    const re = new RegExp("\\s" + m.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + "\\s", "gi");
    t = t.replace(re, " ");
  });
  return t.trim();
}

function partirEnIncidencias(text){
  let t = text;
  CONECTORES_CORTE.forEach(c=>{ t = t.replace(new RegExp(c, "gi"), "|||"); });
  // también partimos por puntos si hay varias frases largas
  t = t.replace(/\.\s+/g, ".|||");
  return t.split("|||").map(s=>s.trim()).filter(s=>s.split(" ").length >= 3);
}

function clasificar(text){
  const low = text.toLowerCase();
  let mejorCat = "GES", mejorCount = 0, subcat = "";
  Object.keys(CATEGORIA_PALABRAS).forEach(cat=>{
    let count = 0, hit = "";
    CATEGORIA_PALABRAS[cat].forEach(p=>{
      if (low.includes(p)){ count++; if(!hit) hit = p; }
    });
    if (count > mejorCount){ mejorCount = count; mejorCat = cat; subcat = hit; }
  });
  const critico = CRITICO_PALABRAS.some(p=>low.includes(p));
  return {categoria: mejorCat, subcategoria: subcat ? capitalize(subcat) : "", critico};
}

function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function redactarTarea(text){
  let t = text.trim();
  t = t.replace(/\s{2,}/g," ");
  t = capitalize(t);
  if (!/[.!?]$/.test(t)) t += ".";
  return t;
}

function procesarLocal(raw){
  const limpio = dedupeConsecutive(limpiarMuletillas(raw));
  const trozos = partirEnIncidencias(limpio);
  const fuente = trozos.length ? trozos : [limpio];
  return fuente
    .filter(t=>t.trim().length > 4)
    .map(t=>{
      const c = clasificar(t);
      return {categoria: c.categoria, subcategoria: c.subcategoria, texto: redactarTarea(t), critico: c.critico};
    });
}

processBtn.addEventListener('click', ()=>{
  const raw = transcript.value.trim();
  if (!raw){ setStatus("Escribe o dicta algo primero.", true); return; }
  const tasks = procesarLocal(raw);
  if (!tasks.length){
    setStatus("No se detectó ninguna incidencia clara en el texto.", true);
    return;
  }
  tasks.forEach(addIncident);
  transcript.value = "";
  setStatus(`Añadida${tasks.length>1?'s':''} ${tasks.length} incidencia${tasks.length>1?'s':''}.`);
  saveDraft();
});

// ---------- Lista de incidencias ----------
function addIncident(t){
  const cat = CATS[t.categoria] ? t.categoria : "GES";
  seq[cat] += 1;
  const code = `${cat}-${String(seq[cat]).padStart(2,'0')}`;
  incidents.push({
    code, cat,
    subcat: t.subcategoria || "",
    text: t.texto,
    critico: !!t.critico
  });
  renderList();
}

function removeIncident(code){
  incidents = incidents.filter(i=>i.code !== code);
  renderList();
  saveDraft();
}

function renderList(){
  ticketList.innerHTML = "";
  countLabel.textContent = incidents.length;
  if (!incidents.length){
    ticketList.appendChild(emptyMsg);
    return;
  }
  incidents.forEach(inc=>{
    const c = CATS[inc.cat];
    const div = document.createElement('div');
    div.className = "ticket";
    div.innerHTML = `
      <div class="row1">
        <span class="tag" style="color:${c.color}; background:${c.bg}">${inc.code} · ${c.label}</span>
        ${inc.critico ? '<span class="crit">⚠ CRÍTICO</span>' : ''}
      </div>
      <p class="txt">${escapeHtml(inc.text)}</p>
      <div class="row2">
        <span class="subcat">${escapeHtml(inc.subcat || "")}</span>
        <button class="del" data-code="${inc.code}">Eliminar</button>
      </div>
    `;
    div.querySelector('.del').addEventListener('click', ()=>removeIncident(inc.code));
    ticketList.appendChild(div);
  });
}

function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ---------- Persistencia de borrador ----------
async function saveDraft(){
  if (!draftKey) return;
  try{
    await window.storage.set(draftKey, JSON.stringify({incidents, seq, store: currentStore}));
  } catch(e){ /* almacenamiento no disponible, seguimos sin bloquear */ }
}

async function loadDraft(){
  if (!draftKey) return;
  try{
    const res = await window.storage.get(draftKey);
    if (res && res.value){
      const parsed = JSON.parse(res.value);
      incidents = parsed.incidents || [];
      seq = parsed.seq || seq;
      renderList();
    }
  } catch(e){ /* no hay borrador previo */ }
}

storeSelect.addEventListener('change', ()=>{
  currentStore = storeSelect.value;
  draftKey = `visita:${currentStore || 'sin-tienda'}:${new Date().toISOString().slice(0,10)}`;
  incidents = []; seq = {PER:0,ALI:0,NOA:0,CAJ:0,ALM:0,MAN:0,GES:0};
  renderList();
  loadDraft();
});

clearBtn.addEventListener('click', ()=>{ transcript.value=""; setStatus(""); });

newVisitBtn.addEventListener('click', ()=>{
  if (incidents.length && !confirm("¿Empezar una nueva visita? Se perderá la lista actual si no la has descargado.")) return;
  incidents = []; seq = {PER:0,ALI:0,NOA:0,CAJ:0,ALM:0,MAN:0,GES:0};
  transcript.value = ""; setStatus("");
  renderList();
  saveDraft();
});

// ---------- Exportar a Word ----------
exportBtn.addEventListener('click', ()=>{
  if (!currentStore){ setStatus("Selecciona una tienda antes de exportar.", true); return; }
  if (!incidents.length){ setStatus("No hay incidencias que exportar.", true); return; }

  const grouped = {};
  incidents.forEach(i=>{ (grouped[i.cat] = grouped[i.cat]||[]).push(i); });

  let body = "";
  Object.keys(CATS).forEach(catKey=>{
    if (!grouped[catKey]) return;
    body += `<h2 style="font-family:Arial,sans-serif;font-size:14pt;color:${CATS[catKey].color.replace('var(--c-','#').replace(')','')};border-bottom:1px solid #ccc;padding-bottom:4px;margin-top:22px;">${CATS[catKey].label}</h2>`;
    body += `<table style="width:100%;border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt;">`;
    grouped[catKey].forEach(i=>{
      body += `<tr>
        <td style="width:22px;vertical-align:top;padding:4px 6px 4px 0;">☐</td>
        <td style="padding:4px 0;">${escapeHtml(i.text)}${i.critico ? ' <b style="color:#a8402a;">(CRÍTICO)</b>' : ''}${i.subcat ? ` <span style="color:#777;font-size:9.5pt;">— ${escapeHtml(i.subcat)}</span>` : ''}</td>
      </tr>`;
    });
    body += `</table>`;
  });

  const html = `
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>Informe de visita</title></head>
<body style="font-family:Calibri,Arial,sans-serif; color:#201f1c;">
  <div style="border-bottom:3px solid #201f1c; padding-bottom:10px; margin-bottom:14px;">
    <h1 style="font-family:Arial,sans-serif; font-size:18pt; margin:0; letter-spacing:0.5px;">INFORME DE VISITA A TIENDA</h1>
    <p style="margin:4px 0 0; font-size:11pt; color:#5c584f;">Family Cash · Zona Sur</p>
  </div>
  <table style="margin-bottom:10px; font-size:11pt;">
    <tr><td style="padding:2px 12px 2px 0;"><b>Tienda:</b></td><td>${escapeHtml(currentStore)}</td></tr>
    <tr><td style="padding:2px 12px 2px 0;"><b>Fecha de visita:</b></td><td>${todayStr()}</td></tr>
    <tr><td style="padding:2px 12px 2px 0;"><b>Total incidencias:</b></td><td>${incidents.length}</td></tr>
  </table>
  ${body}
  <p style="margin-top:30px; font-size:10pt; color:#777;">Documento generado a partir de dictado en visita de tienda. Pendiente de revisión y seguimiento por dirección de tienda.</p>
</body>
</html>`;

  const blob = new Blob(['\ufeff', html], {type: 'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeStore = currentStore.split('·')[0].trim().replace(/\s+/g,'');
  a.href = url;
  a.download = `Visita_${safeStore}_${new Date().toISOString().slice(0,10)}.doc`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Documento descargado");
});
</script>
</body>
</html>
